<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University AI Policy Dashboard</title>
    <style>
        :root {
            --bg: #f2f6f8;
            --panel: #fff;
            --ink: #1a242f;
            --muted: #5c6b78;
            --grid: #dbe4ea;
            --red: #d94841;
            --yellow: #f2c14e;
            --green: #2b9348;
            --greenplus: #0f9d58
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: IBM Plex Sans, Segoe UI, Tahoma, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 10% 20%, #d7eef7 0%, transparent 35%), radial-gradient(circle at 85% 10%, #fbe4cf 0%, transparent 32%), linear-gradient(180deg, #edf4f7 0%, #f9fbfc 45%, #edf3f6 100%)
        }

        .wrap {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px
        }

        .hero {
            background: linear-gradient(135deg, #0b7285 0%, #125d74 45%, #174a68 100%);
            color: #fff;
            border-radius: 16px;
            padding: 18px 20px
        }

        .hero h1 {
            margin: 0 0 6px;
            font-size: clamp(1.2rem, 2.6vw, 1.95rem)
        }

        .hero p {
            margin: 0;
            color: #d8edf2;
            font-size: .93rem
        }

        .controls {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1.1fr auto auto;
            gap: 10px;
            align-items: center
        }

        .input,
        .select {
            border: 1px solid #7eb4c1;
            background: #f6fbfd;
            color: #133746;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: .93rem;
            width: 100%
        }

        .btns {
            display: inline-flex;
            border: 1px solid #7eb4c1;
            border-radius: 10px;
            overflow: hidden;
            background: #f6fbfd
        }

        .btns button {
            border: 0;
            padding: 10px 12px;
            background: transparent;
            color: #1b495a;
            cursor: pointer
        }

        .btns button.active {
            background: #0b7285;
            color: #fff
        }

        .stats {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        .stat {
            background: #fff;
            border: 1px solid #cfe0e8;
            border-radius: 10px;
            padding: 7px 11px;
            min-width: 130px
        }

        .k {
            color: var(--muted);
            font-size: .76rem
        }

        .v {
            font-weight: 700
        }

        .table-wrap {
            margin-top: 16px;
            background: #fff;
            border: 1px solid #d4e0e6;
            border-radius: 12px;
            overflow: auto
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            min-width: 100%;
            font-size: .82rem
        }

        thead th {
            position: sticky;
            top: 0;
            background: #f0f7fa;
            border-bottom: 1px solid var(--grid);
            padding: 8px;
            text-align: left;
            white-space: nowrap;
            z-index: 2
        }

        tbody td {
            border-bottom: 1px solid #edf2f5;
            border-right: 1px solid #eef3f6;
            padding: 7px 8px
        }

        .sticky {
            position: sticky;
            left: 0;
            background: #fff;
            z-index: 1;
            min-width: 220px
        }

        .thead-sticky {
            z-index: 3;
            background: #e8f2f7
        }

        .score {
            text-align: right;
            min-width: 90px
        }

        .chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: .72rem;
            color: #17495f;
            background: #def1f8;
            border: 1px solid #b7dcea;
            margin-top: 4px
        }

        .cell {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, .08);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer
        }

        .blank {
            background: #e4eaef;
            color: #7c8a96;
            cursor: default
        }

        .red {
            background: #d94841;
            color: #fff
        }

        .yellow {
            background: #f2c14e
        }

        .green {
            background: #2b9348;
            color: #fff
        }

        .greenplus {
            background: #0f9d58;
            color: #fff
        }

        .legend {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: .8rem
        }

        .item {
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(7, 21, 31, .62);
            padding: 14px
        }

        .modal.open {
            display: flex
        }

        .card {
            width: min(760px, 96vw);
            max-height: 88vh;
            overflow: auto;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #d7e4ea
        }

        .head {
            padding: 12px 14px;
            border-bottom: 1px solid #e9f0f4;
            display: flex;
            justify-content: space-between
        }

        .bodyc {
            padding: 12px 14px
        }

        .quote {
            border-left: 4px solid #8cb8c8;
            background: #f3f8fb;
            padding: 10px 12px;
            border-radius: 8px;
            white-space: pre-wrap
        }

        .lbl {
            color: #55717f;
            font-size: .78rem
        }

        .val {
            line-height: 1.45;
            font-size: .92rem;
            margin-bottom: 8px
        }

        a {
            color: #0a6a86
        }

        @media(max-width:980px) {
            .controls {
                grid-template-columns: 1fr
            }

            .sticky {
                min-width: 180px
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <section class="hero">
            <h1>AI Policy Friendliness Dashboard</h1>
            <p>Built from p1-p4 research files. Score formula: 100 * (sum(S)/(3*N_u)) * (0.7 + 0.3*(N_u/25)).</p>
            <div class="controls"><input id="search" class="input" placeholder="Search university...">
                <div id="regions" class="btns"><button data-r="All" class="active">All</button><button
                        data-r="India">India</button><button data-r="International">International</button></div><select
                    id="sort" class="select">
                    <option value="score_desc">Score: High to Low</option>
                    <option value="score_asc">Score: Low to High</option>
                    <option value="name_asc">Name: A-Z</option>
                    <option value="name_desc">Name: Z-A</option>
                </select>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="k">Universities</div>
                    <div id="sU" class="v">0</div>
                </div>
                <div class="stat">
                    <div class="k">India</div>
                    <div id="sI" class="v">0</div>
                </div>
                <div class="stat">
                    <div class="k">International</div>
                    <div id="sN" class="v">0</div>
                </div>
                <div class="stat">
                    <div class="k">Filled Cells</div>
                    <div id="sC" class="v">0</div>
                </div>
            </div>
        </section>
        <section class="table-wrap">
            <table id="t"></table>
        </section>
        <div class="legend">
            <div class="item"><span class="cell green">G</span>Allowed</div>
            <div class="item"><span class="cell yellow">Y</span>Conditional</div>
            <div class="item"><span class="cell red">R</span>Prohibited</div>
            <div class="item"><span class="cell greenplus">G+</span>Strongly encouraged</div>
            <div class="item"><span class="cell blank">-</span>No data</div>
        </div>
    </div>
    <div id="m" class="modal">
        <div class="card">
            <div class="head"><strong id="mt">Policy detail</strong><button id="mc">Close</button></div>
            <div class="bodyc" id="mb"></div>
        </div>
    </div>
    <script>const DATA = { "policies": ["Essays", "Written Assignments", "Take-home Exams", "In-class Exams/Quizzes", "Coding/Programming", "Lab Reports", "Thesis/Dissertation", "Research Papers", "Literature Reviews", "Paraphrasing/Summarizing", "Proofreading/Editing", "Translation", "Citation/Disclosure", "Brainstorming/Ideation", "Fact-checking", "Outlining/Drafting"], "universities": [{ "university": "IIT Bombay", "region": "India", "Nu": 16, "sumS": 21, "B": 0.4375, "friendliness": 39.025, "cells": { "Essays": { "classification": "yellow", "reason": "Permitted within specific certificate modules but requires adherence to institutional integrity norms; AI should not substitute critical reflection.", "quote": "\"The course begins with core modules on AI-ready leadership, Generative AI and agents, AI-led business strategy, and building a responsible AI-first organization.\"", "sourceUrl": "https://fundaspring.com/blogs/education-headlines-in-india/iit-bombay-ai-leadership-course-india-uk-student-partnership-ctet-bed-eligibility-jee-main-corrections-01-december-2025", "sourceLink": "https://fundaspring.com/blogs/education-headlines-in-india/iit-bombay-ai-leadership-course-india-uk-student-partnership-ctet-bed-eligibility-jee-main-corrections-01-december-2025#:~:text=%22The%20course%20begins%20with%20core%20modules%20on%20AI-ready%20leadership%2C%20Generative%20AI%20and%20agents%2C%20AI-led%20business%20strategy%2C%20and%20bui" }, "Written Assignments": { "classification": "yellow", "reason": "Use is permissible for upskilling and learning, but significant portions of the student body still avoid it for formal assignments to maintain integrity.", "quote": "\"46 did not use it for assignments and projects.\"", "sourceUrl": "https://amkresourceinfo.com/iit-bombay-launches-generative-ai-course-for-women-professionals-entrepreneurs/", "sourceLink": "https://amkresourceinfo.com/iit-bombay-launches-generative-ai-course-for-women-professionals-entrepreneurs/#:~:text=%2246%20did%20not%20use%20it%20for%20assignments%20and%20projects.%22" }, "Take-home Exams": { "classification": "yellow", "reason": "Permitted only where the learning objective involves the tool; unproctored usage generally requires disclosure.", "quote": "\"Expectations around AI use will vary from class to class.\"", "sourceUrl": "https://www.iit.edu/sites/default/files/2023-08/Faculty%20Guide%20on%20Teaching%20and%20Generative%20AI.pdf", "sourceLink": "https://www.iit.edu/sites/default/files/2023-08/Faculty%20Guide%20on%20Teaching%20and%20Generative%20AI.pdf#:~:text=%22Expectations%20around%20AI%20use%20will%20vary%20from%20class%20to%20class.%22" }, "In-class Exams/Quizzes": { "classification": "red", "reason": "Strictly prohibited as a substitute for individual logical reasoning unless the exam is specifically designed to test AI interaction.", "quote": "\"AI results may be biassed or erroneous; for a more thorough understanding, refer to primary sources.\"", "sourceUrl": "https://www.imtnagpur.ac.in/assets/pdf/IMT-N%20GenAI%20Policy.pdf", "sourceLink": "https://www.imtnagpur.ac.in/assets/pdf/IMT-N%20GenAI%20Policy.pdf#:~:text=%22AI%20results%20may%20be%20biassed%20or%20erroneous%3B%20for%20a%20more%20thorough%20understanding%2C%20refer%20to%20primary%20sources.%22" }, "Coding/Programming": { "classification": "green", "reason": "Actively integrated into the curriculum for debugging and developing scalable applications.", "quote": "\"ChatGPT for debugging and code explanations.\"", "sourceUrl": "https://www.mygreatlearning.com/iit-bombay-certificate-generative-ai", "sourceLink": "https://www.mygreatlearning.com/iit-bombay-certificate-generative-ai#:~:text=%22ChatGPT%20for%20debugging%20and%20code%20explanations.%22" }, "Lab Reports": { "classification": "yellow", "reason": "AI can assist in the \"fabrication process\" and prototyping but requires human oversight to monitor outputs.", "quote": "\"This requires maintaining a 'Human-in-the-Loop' to continuously monitor outputs and ensure the maxim of 'Delegate, but Validate' is strictly enforced.\"", "sourceUrl": "https://rnd.iitb.ac.in/sites/default/files/2026-01/Sonne%20Vyas%20Arur%20GenAI%20for%20Business%20WP%20Jan%202026.pdf", "sourceLink": "https://rnd.iitb.ac.in/sites/default/files/2026-01/Sonne%20Vyas%20Arur%20GenAI%20for%20Business%20WP%20Jan%202026.pdf#:~:text=%22This%20requires%20maintaining%20a%20'Human-in-the-Loop'%20to%20continuously%20monitor%20outputs%20and%20ensure%20the%20maxim%20of%20'Delegate%2C%20but%20" }, "Thesis/Dissertation": { "classification": "yellow", "reason": "Use of AI for content generation must be disclosed in the Methods or Acknowledgements section.", "quote": "\"If you are using AI tools to generate new content such as text, images, tables, code, etc. you must disclose their use (with details) either in the Methods or in the Acknowledgements section.\"", "sourceUrl": "https://www.iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf", "sourceLink": "https://www.iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf#:~:text=%22If%20you%20are%20using%20AI%20tools%20to%20generate%20new%20content%20such%20as%20text%2C%20images%2C%20tables%2C%20code%2C%20etc.%20you%20must%20disclose%20their%20use%20" }, "Research Papers": { "classification": "yellow", "reason": "Authors assume full responsibility for fact-checking; AI is a tool for efficiency, not an author.", "quote": "\"Authors of content assume full responsibility for verifying the accuracy of their work.\"", "sourceUrl": "https://www.scribd.com/document/900201778/IITDAIGuidelines", "sourceLink": "https://www.scribd.com/document/900201778/IITDAIGuidelines#:~:text=%22Authors%20of%20content%20assume%20full%20responsibility%20for%20verifying%20the%20accuracy%20of%20their%20work.%22" }, "Literature Reviews": { "classification": "green", "reason": "Highly encouraged for \"supporting research through efficient literature summarisation.\"", "quote": "\"supporting research through efficient literature summarisation.\"", "sourceUrl": "https://www.scribd.com/document/900201778/IITDAIGuidelines", "sourceLink": "https://www.scribd.com/document/900201778/IITDAIGuidelines#:~:text=%22supporting%20research%20through%20efficient%20literature%20summarisation.%22" }, "Paraphrasing/Summarizing": { "classification": "green", "reason": "Permitted for \"summarising complex passages\" and \"improving readability.\"", "quote": "\"Faculty were most familiar with AI tools for improving readability, summarising complex passages, and writing code.\"", "sourceUrl": "https://www.iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf", "sourceLink": "https://www.iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf#:~:text=%22Faculty%20were%20most%20familiar%20with%20AI%20tools%20for%20improving%20readability%2C%20summarising%20complex%20passages%2C%20and%20writing%20code.%22" }, "Proofreading/Editing": { "classification": "green", "reason": "Disclosure not required for tools that function similarly to typing assistants (e.g., Grammarly).", "quote": "\"If you are using AI tools to edit and improve the quality of your existing text in much the same way you would use a typing assistant like Grammarly or a word processor, you need not disclose this use.\"", "sourceUrl": "https://www.iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf", "sourceLink": "https://www.iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf#:~:text=%22If%20you%20are%20using%20AI%20tools%20to%20edit%20and%20improve%20the%20quality%20of%20your%20existing%20text%20in%20much%20the%20same%20way%20you%20would%20use%20a%20ty" }, "Translation": { "classification": "green", "reason": "Part of the \"BharatGen\" mission to develop multilingual AI across Indian languages.", "quote": "\"building India's multilingual, multimodal large language models- inclusive and efficient AI across 22+ Indian languages, integrating three key modalities: text, speech\"", "sourceUrl": "https://www.iitb.ac.in/sites/www.iitb.ac.in/files/2026-01/October%20November%20December%202025.pdf", "sourceLink": "https://www.iitb.ac.in/sites/www.iitb.ac.in/files/2026-01/October%20November%20December%202025.pdf#:~:text=%22building%20India's%20multilingual%2C%20multimodal%20large%20language%20models-%20inclusive%20and%20efficient%20AI%20across%2022%2B%20Indian%20languages" }, "Citation/Disclosure": { "classification": "yellow", "reason": "Mandatory for all work generated or assisted by AI tools to ensure transparency.", "quote": "\"Any work or content generated with the assistance of AI tools should be fully disclosed to ensure transparency and maintain academic integrity.\"", "sourceUrl": "https://www.thehindu.com/education/colleges/iit-delhi-sets-new-rules-for-genai-tool-usage-by-students-and-faculty/article69632486.ece", "sourceLink": "https://www.thehindu.com/education/colleges/iit-delhi-sets-new-rules-for-genai-tool-usage-by-students-and-faculty/article69632486.ece#:~:text=%22Any%20work%20or%20content%20generated%20with%20the%20assistance%20of%20AI%20tools%20should%20be%20fully%20disclosed%20to%20ensure%20transparency%20and%20main" }, "Brainstorming/Ideation": { "classification": "green", "reason": "Encouraged for \"generating ideas for projects and presentations\" and creating \"mind maps.\"", "quote": "\"Students report that the GenAI tools were invaluable for creating mind maps, simplifying concepts through examples, and exploring topics with simulations, making them a valuable resource for bridging learning gaps.\"", "sourceUrl": "https://www.scribd.com/document/900201778/IITDAIGuidelines", "sourceLink": "https://www.scribd.com/document/900201778/IITDAIGuidelines#:~:text=%22Students%20report%20that%20the%20GenAI%20tools%20were%20invaluable%20for%20creating%20mind%20maps%2C%20simplifying%20concepts%20through%20examples%2C%20and" }, "Fact-checking": { "classification": "red", "reason": "Strictly warned against relying on AI for judging correctness due to \"errors and fabrications.\"", "quote": "\"AI tools are very poor at judging correctness.\"", "sourceUrl": "https://iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf", "sourceLink": "https://iisc.ac.in/wp-content/uploads/2024/03/Generative\\_AI\\_Science\\_faculty.pdf#:~:text=%22AI%20tools%20are%20very%20poor%20at%20judging%20correctness.%22" }, "Outlining/Drafting": { "classification": "green", "reason": "Permitted for \"early drafting\" and \"structuring outlines.\"", "quote": "\"AI platforms can be used to help with aspects of the writing process, including some early drafting.\"", "sourceUrl": "https://iilmlr.ac.in/download/IILM-Lodhi-Road-AI-Policy.pdf", "sourceLink": "https://iilmlr.ac.in/download/IILM-Lodhi-Road-AI-Policy.pdf#:~:text=%22AI%20platforms%20can%20be%20used%20to%20help%20with%20aspects%20of%20the%20writing%20process%2C%20including%20some%20early%20drafting.%22" } } }, { "university": "IIM Ahmedabad", "region": "India", "Nu": 16, "sumS": 20, "B": 0.4166666666666667, "friendliness": 37.166666666666664, "cells": { "Essays": { "classification": "yellow", "reason": "Allowed for support but must remain original; AI use is permitted but \"plagiarism is completely prohibited.\"", "quote": "\"Plagiarism is completely prohibited, but AI use is allowed.\"", "sourceUrl": "https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html", "sourceLink": "https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22Plagiarism%20is%20completely%20prohibited%2C%20but%20AI%20use%20is%20allowed.%22" }, "Written Assignments": { "classification": "yellow", "reason": "Use is permissible for projects, but students must review and edit output to \"add value.\"", "quote": "\"Don't waste time on writing, spend time on reviewing what AI is writing for you.\"", "sourceUrl": "https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html", "sourceLink": "https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22Don't%20waste%20time%20on%20writing%2C%20spend%20time%20on%20reviewing%20what%20AI%20is%20writing%20for%20you.%22" }, "Take-home Exams": { "classification": "red", "reason": "Moving toward assessments that require original data collection (e.g., shopper behavior observations) beyond AI capabilities.", "quote": "\"You can only add value if you can get something that's not available on the internet \\- personal experiences, expert interviews, original surveys, observational studies and talking to stakeholders.\"", "sourceUrl": "https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html", "sourceLink": "https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22You%20can%20only%20add%20value%20if%20you%20can%20get%20something%20that's%20not%20available%20on%20the%20internet%20%5C-%20personal%20experiences%2C%20expert%20in" }, "In-class Exams/Quizzes": { "classification": "red", "reason": "Use of AI to \"cheat on exams or tests\" is strictly prohibited to maintain individual accountability.", "quote": "\"Don't use AI to cheat on exams or tests.\"", "sourceUrl": "https://www.imtnagpur.ac.in/assets/pdf/IMT-N%20GenAI%20Policy.pdf", "sourceLink": "https://www.imtnagpur.ac.in/assets/pdf/IMT-N%20GenAI%20Policy.pdf#:~:text=%22Don't%20use%20AI%20to%20cheat%20on%20exams%20or%20tests.%22" }, "Coding/Programming": { "classification": "green", "reason": "Integrated into academic workflows to prepare students for an AI-driven workplace.", "quote": "\"AI fluency will be integrated into core academic workflows such as advanced prompting, analytics, coding, simulations, case analysis and AI-assisted research.\"", "sourceUrl": "https://education.economictimes.indiatimes.com/news/partnerships-and-collaborations/openai-partners-with-iit-delhi-iim-ahmedabad-others-to-build-ai-ready-talent/128536817", "sourceLink": "https://education.economictimes.indiatimes.com/news/partnerships-and-collaborations/openai-partners-with-iit-delhi-iim-ahmedabad-others-to-build-ai-ready-talent/128536817#:~:text=%22AI%20fluency%20will%20be%20integrated%20into%20core%20academic%20workflows%20such%20as%20advanced%20prompting%2C%20analytics%2C%20coding%2C%20simulations%2C%20" }, "Lab Reports": { "classification": "yellow", "reason": "Permitted for automating \"business operations decisions using data.\"", "quote": "\"The training will help automate business operations decisions using data.\"", "sourceUrl": "https://iima.ac.in/sites/default/files/2024-06/Communique%20-%20March%202024%20%28for%20print%29\\_compressed%20%281%29.pdf", "sourceLink": "https://iima.ac.in/sites/default/files/2024-06/Communique%20-%20March%202024%20%28for%20print%29\\_compressed%20%281%29.pdf#:~:text=%22The%20training%20will%20help%20automate%20business%20operations%20decisions%20using%20data.%22" }, "Thesis/Dissertation": { "classification": "yellow", "reason": "Disclosure is mandatory; students should provide screenshots or links to ChatGPT conversations in an appendix.", "quote": "\"he/she must acknowledge its use and specify how and where it has been used and include an Appendix for references of ChatGPT links to conversationsor screenshots.\"", "sourceUrl": "https://iilmlr.ac.in/download/IILM-Lodhi-Road-AI-Policy.pdf", "sourceLink": "https://iilmlr.ac.in/download/IILM-Lodhi-Road-AI-
