<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University AI Policy Dashboard</title>
    <style>
        :root {
            --bg: #f2f6f8;
            --panel: #fff;
            --ink: #1a242f;
            --muted: #5c6b78;
            --grid: #dbe4ea;
            --red: #d94841;
            --yellow: #f2c14e;
            --green: #2b9348;
            --greenplus: #0f9d58
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: IBM Plex Sans, Segoe UI, Tahoma, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 10% 20%, #d7eef7 0%, transparent 35%), radial-gradient(circle at 85% 10%, #fbe4cf 0%, transparent 32%), linear-gradient(180deg, #edf4f7 0%, #f9fbfc 45%, #edf3f6 100%)
        }

        .wrap {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px
        }

        .hero {
            background: linear-gradient(135deg, #0b7285 0%, #125d74 45%, #174a68 100%);
            color: #fff;
            border-radius: 16px;
            padding: 18px 20px
        }

        .hero h1 {
            margin: 0 0 6px;
            font-size: clamp(1.2rem, 2.6vw, 1.95rem)
        }

        .hero p {
            margin: 0;
            color: #d8edf2;
            font-size: .93rem
        }

        .controls {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1.1fr auto auto;
            gap: 10px;
            align-items: center
        }

        .input,
        .select {
            border: 1px solid #7eb4c1;
            background: #f6fbfd;
            color: #133746;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: .93rem;
            width: 100%
        }

        .btns {
            display: inline-flex;
            border: 1px solid #7eb4c1;
            border-radius: 10px;
            overflow: hidden;
            background: #f6fbfd
        }

        .btns button {
            border: 0;
            padding: 10px 12px;
            background: transparent;
            color: #1b495a;
            cursor: pointer
        }

        .btns button.active {
            background: #0b7285;
            color: #fff
        }

        .stats {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        .stat {
            background: #fff;
            border: 1px solid #cfe0e8;
            border-radius: 10px;
            padding: 7px 11px;
            min-width: 130px
        }

        .k {
            color: var(--muted);
            font-size: .76rem
        }

        .v {
            font-weight: 700
        }

        .table-wrap {
            margin-top: 16px;
            background: #fff;
            border: 1px solid #d4e0e6;
            border-radius: 12px;
            overflow: auto
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: max-content;
            min-width: 100%;
            font-size: .82rem
        }

        thead th {
            position: sticky;
            top: 0;
            background: #f0f7fa;
            border-bottom: 1px solid var(--grid);
            padding: 8px;
            text-align: left;
            white-space: nowrap;
            z-index: 2
        }

        tbody td {
            border-bottom: 1px solid #edf2f5;
            border-right: 1px solid #eef3f6;
            padding: 7px 8px
        }

        .sticky {
            position: sticky;
            left: 0;
            background: #fff;
            z-index: 1;
            min-width: 220px
        }

        .thead-sticky {
            z-index: 3;
            background: #e8f2f7
        }

        .score {
            text-align: right;
            min-width: 90px
        }

        .chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: .72rem;
            color: #17495f;
            background: #def1f8;
            border: 1px solid #b7dcea;
            margin-top: 4px
        }

        .cell {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, .08);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer
        }

        .blank {
            background: #e4eaef;
            color: #7c8a96;
            cursor: default
        }

        .red {
            background: #d94841;
            color: #fff
        }

        .yellow {
            background: #f2c14e
        }

        .green {
            background: #2b9348;
            color: #fff
        }

        .greenplus {
            background: #0f9d58;
            color: #fff
        }

        .legend {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: .8rem
        }

        .item {
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(7, 21, 31, .62);
            padding: 14px
        }

        .modal.open {
            display: flex
        }

        .card {
            width: min(760px, 96vw);
            max-height: 88vh;
            overflow: auto;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #d7e4ea
        }

        .head {
            padding: 12px 14px;
            border-bottom: 1px solid #e9f0f4;
            display: flex;
            justify-content: space-between
        }

        .bodyc {
            padding: 12px 14px
        }

        .quote {
            border-left: 4px solid #8cb8c8;
            background: #f3f8fb;
            padding: 10px 12px;
            border-radius: 8px;
            white-space: pre-wrap
        }

        .lbl {
            color: #55717f;
            font-size: .78rem
        }

        .val {
            line-height: 1.45;
            font-size: .92rem;
            margin-bottom: 8px
        }

        a {
            color: #0a6a86
        }

        @media(max-width:980px) {
            .controls {
                grid-template-columns: 1fr
            }

            .sticky {
                min-width: 180px
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <section class="hero">
            <h1>AI Policy Friendliness Dashboard</h1>
            <p>Built from p1-p4 research files. Score formula: 100 * (sum(S)/(3*N_u)) * (0.7 + 0.3*(N_u/25)).</p>
            <div class="controls"><input id="search" class="input" placeholder="Search university...">
                <div id="regions" class="btns"><button data-r="All" class="active">All</button><button
                        data-r="India">India</button><button data-r="International">International</button></div><select
                    id="sort" class="select">
                    <option value="score_desc">Score: High to Low</option>
                    <option value="score_asc">Score: Low to High</option>
                    <option value="name_asc">Name: A-Z</option>
                    <option value="name_desc">Name: Z-A</option>
                </select>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="k">Universities</div>
                    <div id="sU" class="v">0</div>
                </div>
                <div class="stat">
                    <div class="k">India</div>
                    <div id="sI" class="v">0</div>
                </div>
                <div class="stat">
                    <div class="k">International</div>
                    <div id="sN" class="v">0</div>
                </div>
                <div class="stat">
                    <div class="k">Filled Cells</div>
                    <div id="sC" class="v">0</div>
                </div>
            </div>
        </section>
        <section class="table-wrap">
            <table id="t"></table>
        </section>
        <div class="legend">
            <div class="item"><span class="cell green">G</span>Allowed</div>
            <div class="item"><span class="cell yellow">Y</span>Conditional</div>
            <div class="item"><span class="cell red">R</span>Prohibited</div>
            <div class="item"><span class="cell greenplus">G+</span>Strongly encouraged</div>
            <div class="item"><span class="cell blank">-</span>No data</div>
        </div>
    </div>
    <div id="m" class="modal">
        <div class="card">
            <div class="head"><strong id="mt">Policy detail</strong><button id="mc">Close</button></div>
            <div class="bodyc" id="mb"></div>
        </div>
    </div>
    <script>const DATA = {"policies":["Essays","Written Assignments","Take-home Exams","In-class Exams/Quizzes","Coding/Programming","Lab Reports","Thesis/Dissertation","Research Papers","Literature Reviews","Paraphrasing/Summarizing","Proofreading/Editing","Translation","Citation/Disclosure","Brainstorming/Ideation","Fact-checking","Outlining/Drafting"],"universities":[{"university":"IIT Bombay","region":"India","Nu":1,"sumS":1,"B":"0.33","friendliness":24,"cells":{"Take-home Exams":{"classification":"yellow","reason":"Permitted only where the learning objective involves the tool; unproctored usage generally requires disclosure.","quote":"\"Expectations around AI use will vary from class to class.\"","sourceUrl":"https://www.iit.edu/sites/default/files/2023-08/Faculty%20Guide%20on%20Teaching%20and%20Generative%20AI.pdf","sourceLink":"https://www.iit.edu/sites/default/files/2023-08/Faculty%20Guide%20on%20Teaching%20and%20Generative%20AI.pdf#:~:text=%22Expectations%20around%20AI%20use%20will%20vary%20from%20class%20to%20class.%22"}}},{"university":"IIM Ahmedabad","region":"India","Nu":4,"sumS":3,"B":"0.25","friendliness":19,"cells":{"Essays":{"classification":"yellow","reason":"Allowed for support but must remain original; AI use is permitted but \"plagiarism is completely prohibited.\"","quote":"\"Plagiarism is completely prohibited, but AI use is allowed.\"","sourceUrl":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html","sourceLink":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22Plagiarism%20is%20completely%20prohibited%2C%20but%20AI%20use%20is%20allowed.%22"},"Written Assignments":{"classification":"yellow","reason":"Use is permissible for projects, but students must review and edit output to \"add value.\"","quote":"\"Don't waste time on writing, spend time on reviewing what AI is writing for you.\"","sourceUrl":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html","sourceLink":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22Don't%20waste%20time%20on%20writing%2C%20spend%20time%20on%20reviewing%20what%20AI%20is%20writing%20for%20you.%22"},"Take-home Exams":{"classification":"red","reason":"Moving toward assessments that require original data collection (e.g., shopper behavior observations) beyond AI capabilities.","quote":"\"You can only add value if you can get something that's not available on the internet \\- personal experiences, expert interviews, original surveys, observational studies and talking to stakeholders.\"","sourceUrl":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html","sourceLink":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22You%20can%20only%20add%20value%20if%20you%20can%20get%20something%20that's%20not%20available%20on%20the%20internet%20%5C-%20personal%20experiences%2C%20expert%20in"},"Research Papers":{"classification":"yellow","reason":"Permitted for secondary research, but students must focus on \"original analysis beyond AI's reach.\"","quote":"\"ChatGPT can already do far better quality secondary research than most of you can. At zero cost and in zero time.\"","sourceUrl":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html","sourceLink":"https://www.livemint.com/news/trends/talk-with-actual-humans-iim-ahmedabad-student-scores-a-using-chatgpt-for-project-shares-note-on-real-creativity-11746419737366.html#:~:text=%22ChatGPT%20can%20already%20do%20far%20better%20quality%20secondary%20research%20than%20most%20of%20you%20can.%20At%20zero%20cost%20and%20in%20zero%20time.%22"}}},{"university":"IISc Bangalore","region":"India","Nu":0,"sumS":0,"B":"0.00","friendliness":0,"cells":{}},{"university":"IIT Delhi","region":"India","Nu":1,"sumS":2,"B":"0.67","friendliness":47,"cells":{"Outlining/Drafting":{"classification":"green","reason":"Permitted for \"structuring outlines\" and assisting in early phases of content creation.","quote":"\"idea generation or structuring outlines.\"","sourceUrl":"https://nludelhi.ac.in/wp-content/uploads/2025/11/AI-Policy.pdf","sourceLink":"https://nludelhi.ac.in/wp-content/uploads/2025/11/AI-Policy.pdf#:~:text=%22idea%20generation%20or%20structuring%20outlines.%22"}}},{"university":"IIT Madras","region":"India","Nu":0,"sumS":0,"B":"0.00","friendliness":0,"cells":{}},{"university":"University of Cambridge","region":"International","Nu":15,"sumS":15,"B":"0.33","friendliness":29,"cells":{"Essays":{"classification":"red","reason":"Unacknowledged content in summative work is academic misconduct.","quote":"\"using any unacknowledged content generated by artificial intelligence within a summative assessment as though it is their own work constitutes academic misconduct,\"","sourceUrl":"https://www.varsity.co.uk/news/30548","sourceLink":"https://www.varsity.co.uk/news/30548#:~:text=%22using%20any%20unacknowledged%20content%20generated%20by%20artificial%20intelligence%20within%20a%20summative%20assessment%20as%20though%20it%20is%20the"},"Written Assignments":{"classification":"red","reason":"Prohibits presenting AI-generated ideas as own work (HPS).","quote":"\"HPS prohibits students from presenting text, ideas and other material generated by AI tools as their own work (for any type of assessment, summative or formative).\"","sourceUrl":"https://www.hps.cam.ac.uk/students/academic-misconduct","sourceLink":"https://www.hps.cam.ac.uk/students/academic-misconduct#:~:text=%22HPS%20prohibits%20students%20from%20presenting%20text%2C%20ideas%20and%20other%20material%20generated%20by%20AI%20tools%20as%20their%20own%20work%20(for%20any%20"},"Take-home Exams":{"classification":"red","reason":"Requires a cover sheet confirming no impermissible AI use.","quote":"\"HPS requires students to submit a cover sheet with any written take-home summative work confirming that you have read our policy, declaring that you have not used AI tools in impermissible ways.\"","sourceUrl":"https://www.hps.cam.ac.uk/students/academic-misconduct","sourceLink":"https://www.hps.cam.ac.uk/students/academic-misconduct#:~:text=%22HPS%20requires%20students%20to%20submit%20a%20cover%20sheet%20with%20any%20written%20take-home%20summative%20work%20confirming%20that%20you%20have%20read%20o"},"In-class Exams/Quizzes":{"classification":"red","reason":"Prohibited as it bypasses the learning objective.","quote":"\"In many cases, the rise of AI reinforces the value of in-person exams, as well as digital exams with human supervision, which are fair, rigorous and help guard against plagiarism and cheating.\"","sourceUrl":"https://www.cambridge.org/news-and-insights/The-Cambridge-approach-to-generative-AI-and-assessment","sourceLink":"https://www.cambridge.org/news-and-insights/The-Cambridge-approach-to-generative-AI-and-assessment#:~:text=%22In%20many%20cases%2C%20the%20rise%20of%20AI%20reinforces%20the%20value%20of%20in-person%20exams%2C%20as%20well%20as%20digital%20exams%20with%20human%20supervision%2C"},"Coding/Programming":{"classification":"green","reason":"Permitted for writing code to meet prompted briefs in personal study.","quote":"\"The software can write feasible code in a variety of languages to meet the prompted brief.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20write%20feasible%20code%20in%20a%20variety%20of%20languages%20to%20meet%20the%20prompted%20brief.%22"},"Lab Reports":{"classification":"yellow","reason":"Analysis and visualisation of qualitative data is supported.","quote":"\"The software can analyse, summarise, and visualise qualitative data, providing insights for further evaluation.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20analyse%2C%20summarise%2C%20and%20visualise%20qualitative%20data%2C%20providing%20insights%20for%20further%20evaluation.%22"},"Thesis/Dissertation":{"classification":"red","reason":"Prohibits quoting directly from AI outputs (HPS).","quote":"\"HPS prohibits using AI as a source or quoting directly from the output of AI.\"","sourceUrl":"https://www.hps.cam.ac.uk/students/academic-misconduct","sourceLink":"https://www.hps.cam.ac.uk/students/academic-misconduct#:~:text=%22HPS%20prohibits%20using%20AI%20as%20a%20source%20or%20quoting%20directly%20from%20the%20output%20of%20AI.%22"},"Research Papers":{"classification":"yellow","reason":"Appropriate use permitted for personal research with local guidance.","quote":"\"Students are permitted to make appropriate use of GenAI tools to support their personal study, research and formative work, however, due to differences between disciplines across the University, you should always consult local guidance.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22Students%20are%20permitted%20to%20make%20appropriate%20use%20of%20GenAI%20tools%20to%20support%20their%20personal%20study%2C%20research%20and%20formative%20w"},"Literature Reviews":null,"Paraphrasing/Summarizing":{"classification":"yellow","reason":"Permitted for language support and paraphrasing in personal study, but using it to present rewritten text as original assessed work remains misconduct.","quote":"\"The software can be used to paraphrase existing content...\" and students are permitted to make appropriate use for personal study and formative work with local guidance.","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20be%20used%20to%20paraphrase%20existing%20content%20to%20make%20it%20appear%20as%20original%20work.%22%20(Listed%20under%20risks%2Facadem"},"Proofreading/Editing":{"classification":"green","reason":"AI can be used to suggest grammar and punctuation improvements.","quote":"\"The software can suggest improvements in grammar, punctuation, sentence structure, and word choice.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20suggest%20improvements%20in%20grammar%2C%20punctuation%2C%20sentence%20structure%2C%20and%20word%20choice.%22"},"Translation":{"classification":"green","reason":"Supported as a tool for personal study.","quote":"\"The software can translate content from one language to another.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20translate%20content%20from%20one%20language%20to%20another.%22"},"Citation/Disclosure":{"classification":"yellow","reason":"Must acknowledge AI use when it contributes significantly to unrevised work.","quote":"\"Ensure use of GenAI is acknowledged if it is used to make a significant and unrevised contribution to a substantive or impactful piece of work.\"","sourceUrl":"https://www.information-compliance.admin.cam.ac.uk/data-protection/guidance/ai-guidance","sourceLink":"https://www.information-compliance.admin.cam.ac.uk/data-protection/guidance/ai-guidance#:~:text=%22Ensure%20use%20of%20GenAI%20is%20acknowledged%20if%20it%20is%20used%20to%20make%20a%20significant%20and%20unrevised%20contribution%20to%20a%20substantive%20or%20"},"Brainstorming/Ideation":{"classification":"green","reason":"Explicitly permitted for suggesting sentences and inspiration.","quote":"\"The software can suggest sentences or paragraphs which are used to inspire a student's own line of thought.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20suggest%20sentences%20or%20paragraphs%20which%20are%20used%20to%20inspire%20a%20student's%20own%20line%20of%20thought.%22"},"Fact-checking":{"classification":"yellow","reason":"Students must verify outputs from trusted sources.","quote":"\"GenAI tools can commonly produce incorrect or unsubstantiated information and as such should always be verified from trusted and reliable sources.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22GenAI%20tools%20can%20commonly%20produce%20incorrect%20or%20unsubstantiated%20information%20and%20as%20such%20should%20always%20be%20verified%20from%20tr"},"Outlining/Drafting":{"classification":"green","reason":"Permitted for creating structured outlines for essays.","quote":"\"The software can help create a structured outline for the essay, or part of an essay.\"","sourceUrl":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai","sourceLink":"https://blendedlearning.cam.ac.uk/artificial-intelligence-and-education/using-generative-ai#:~:text=%22The%20software%20can%20help%20create%20a%20structured%20outline%20for%20the%20essay%2C%20or%20part%20of%20an%20essay.%22"}}},{"university":"University of Oxford","region":"International","Nu":13,"sumS":13,"B":"0.33","friendliness":29,"cells":{"Essays":{"classification":"red","reason":"Prohibited in summative work unless explicitly stated.","quote":"\"Any unauthorised use of AI in work submitted for assessment constitutes cheating and plagiarism under University rules, penalties for which include failing the relevant assessment and, in appropriate cases, expulsion.\"","sourceUrl":"https://www.ox.ac.uk/students/life/it/guidance-safe-and-responsible-use-gen-ai-tools","sourceLink":"https://www.ox.ac.uk/students/life/it/guidance-safe-and-responsible-use-gen-ai-tools#:~:text=%22Any%20unauthorised%20use%20of%20AI%20in%20work%20submitted%20for%20assessment%20constitutes%20cheating%20and%20plagiarism%20under%20University%20rules%2C"},"Written Assignments":null,"Take-home Exams":{"classification":"yellow","reason":"Assessment use is conditional and depends on explicit written permission per assessment.","quote":"\"Any use of AI in work submitted for assessment is unauthorised unless you are specifically told differently in writing, in advance of the assessment, in instructions from your faculty's or department for the specific assessment in question.\"","sourceUrl":"https://www.ox.ac.uk/students/life/it/guidance-safe-and-responsible-use-gen-ai-tools","sourceLink":"https://www.ox.ac.uk/students/life/it/guidance-safe-and-responsible-use-gen-ai-tools#:~:text=%22Any%20use%20of%20AI%20in%20work%20submitted%20for%20 phrasing/Summarizing":{"classification":"yellow","reason":"Tools like Grammarly's AI or paraphrasing apps are often prohibited by instructors.","quote":"\"Paraphrasing apps and Grammarly's AI writing partner service are derived from generative AI and some courses may not permit their use.\"","sourceUrl":"https://www.utm.utoronto.ca/academic-integrity/students/generative-ai","sourceLink":"https://www.utm.utoronto.ca/academic-integrity/students/generative-ai#:~:text=%22Paraphrasing%20apps%20and%20Grammarly's%20AI%20writing%20partner%20service%20are%20derived%20from%20generative%20AI%20and%20some%20courses%20may%20not%20pe"},"Proofreading/Editing":{"classification":"yellow","reason":"Allowed for graduate-level milestones only if transparency and ethical standards are met.","quote":"\"Innovative and creative uses of generative AI may support scholarly activities and help facilitate high quality research, particularly in certain disciplines.\"","sourceUrl":"https://www.sgs.utoronto.ca/about/guidance-on-the-use-of-generative-artificial-intelligence/","sourceLink":"https://www.sgs.utoronto.ca/about/guidance-on-the-use-of-generative-artificial-intelligence/#:~:text=%22Innovative%20and%20creative%20uses%20of%20generative%20AI%20may%20support%20scholarly%20activities%20and%20help%20facilitate%20high%20quality%20researc"},"Translation":null,"Citation/Disclosure":{"classification":"yellow","reason":"Mandatory to cite all AI-generated portions and provide prompts in an appendix.","quote":"\"For example, you may need to cite the portions that were generated by AI, or you may need to include the prompts and outputs that you used in an appendix.\"","sourceUrl":"https://www.utm.utoronto.ca/academic-integrity/students/generative-ai","sourceLink":"https://www.utm.utoronto.ca/academic-integrity/students/generative-ai#:~:text=%22For%20example%2C%20you%20may%20need%20to%20cite%20the%20portions%20that%20were%20generated%20by%20AI%2C%20or%20you%20may%20need%20to%20include%20the%20prompts%20and%20ou"},"Brainstorming/Ideation":{"classification":"yellow","reason":"Permitted for administrative staff and students as a tool for innovation and efficiency.","quote":"\"It aims to empower staff to harness the potential benefits of AI for enhancing productivity, innovation, and efficiency in their work, while ensuring that potential risks – including but not limited to data privacy, intellectual property, and bias – are mitigated.\"","sourceUrl":"https://people.utoronto.ca/employees/administrative-staff-and-ai/guideline-on-the-use-of-artificial-intelligence-by-university-administrative-staff/","sourceLink":"https://people.utoronto.ca/employees/administrative-staff-and-ai/guideline-on-the-use-of-artificial-intelligence-by-university-administrative-staff/#:~:text=%22It%20aims%20to%20empower%20staff%20to%20harness%20the%20potential%20benefits%20of%20AI%20for%20enhancing%20productivity%2C%20innovation%2C%20and%20efficiency"},"Fact-checking":{"classification":"red","reason":"Prohibited to rely on AI for research; must verify all claims against primary sources.","quote":"\"AI systems may invent results, sources, and even authors or researchers to better satisfy your query, or they may skew, bias or interpret results in ways that may better fit your request or expectations.\"","sourceUrl":"https://security.utoronto.ca/governance/guidelines/use-ai-intelligently/","sourceLink":"https://security.utoronto.ca/governance/guidelines/use-ai-intelligently/#:~:text=%22AI%20systems%20may%20invent%20results%2C%20sources%2C%20and%20even%20authors%20or%20researchers%20to%20better%20satisfy%20your%20query%2C%20or%20they%20may%20skew%2C"},"Outlining/Drafting":{"classification":"yellow","reason":"Permitted as a graduate tool for designing or drafting work provided it does not supplant learning.","quote":"\"This includes, for example, using generative AI tools in searching, designing, outlining, drafting, writing, editing or producing audio or visual content for comprehensive exams, th -class Exams/Quizzes":{"classification":"red","reason":"Mandatory undertaking from students to not use mobile devices to curb AI use in exams.","quote":"\"The university has started taking an undertaking from students that they would not use mobiles while appearing for online semester exams to curb the use of AI.\"","sourceUrl":"https://www.telegraphindia.com/india/iits-iims-and-universities-struggle-to-tackle-rising-student-use-of-generative-ai-tools-prnt/cid/2128628","sourceLink":"https://www.telegraphindia.com/india/iits-iims-and-universities-struggle-to-tackle-rising-student-use-of-generative-ai-tools-prnt/cid/2128628#:~:text=%22The%20university%20has%20started%20taking%20an%20undertaking%20from%20students%20that%20they%20would%20not%20use%20mobiles%20while%20appearing%20for%20onli"},"Coding/Programming":{"classification":"yellow","reason":"Students must learn the technology and its functions to aware of the limitations.","quote":"\"The students will learn the science behind the AI operation. Once they know the technology and the way it functions, they will be aware of the limitations and the best use of the tools\"","sourceUrl":"https://www.telegraphindia.com/india/iits-iims-and-universities-struggle-to-tackle-rising-student-use-of-generative-ai-tools-prnt/cid/2128628","sourceLink":"https://www.telegraphindia.com/india/iits-iims-and-universities-struggle-to-tackle-rising-student-use-of-generative-ai-tools-prnt/cid/2128628#:~:text=%22The%20students%20will%20learn%20the%20science%20behind%20the%20AI%20operation.%20Once%20they%20know%20the%20technology%20and%20the%20way%20it%20functions%2C%20th"},"Lab Reports":null,"Thesis/Dissertation":null,"Research Papers":null,"Literature Reviews":null,"Paraphrasing/Summarizing":null,"Proofreading/Editing":null,"Translation":null,"Citation/Disclosure":null,"Brainstorming/Ideation":null,"Fact-checking":{"classification":"yellow","reason":"AI-generated materials are cautioned for containing untraceable or non-existent references         (function () { const t = document.getElementById("t"), s = document.getElementById("search"), so = document.getElementById("sort"), m = document.getElementById("m"), mt = document.getElementById("mt"), mb = document.getElementById("mb"); let region = "All"; function cc(c) { if (!c) return { k: "blank", l: "-", n: "Blank" }; if (c.classification === "red") return { k: "red", l: "R", n: "Red" }; if (c.classification === "yellow") return { k: "yellow", l: "Y", n: "Yellow" }; if (c.classification === "green") return { k: "green", l: "G", n: "Green" }; return { k: "greenplus", l: "G+", n: "Green+" }; } function ff(n) { return Number(n || 0).toFixed(2); } function esc(x) { return String(x || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); } function rows() { const q = s.value.trim().toLowerCase(); const r = DATA.universities.filter(u => (!q || u.university.toLowerCase().includes(q)) && (region === "All" || u.region === region)); const z = so.value; r.sort((a, b) => z === "score_desc" ? (b.friendliness - a.friendliness || a.university.localeCompare(b.university)) : z === "score_asc" ? (a.friendliness - b.friendliness || a.university.localeCompare(b.university)) : z === "name_desc" ? b.university.localeCompare(a.university) : a.university.localeCompare(b.university)); return r; } function stats(rs) { document.getElementById("sU").textContent = rs.length; document.getElementById("sI").textContent = rs.filter(x => x.region === "India").length; document.getElementById("sN").textContent = rs.filter(x => x.region === "International").length; let f = 0; rs.forEach(r => DATA.policies.forEach(p => { if (r.cells[p]) f++; })); document.getElementById("sC").textContent = f; } function openD(u, p, c) { mt.textContent = u.university + " - " + p; mb.innerHTML = "<div class='lbl'>Classification</div><div class='val'>" + cc(c).n + "</div><div class='lbl'>One-line reason</div><div class='val'>" + esc(c.reason) + "</div><div class='lbl'>Exact quote</div><div class='quote'>" + esc(c.quote) + "</div><div class='lbl' style='margin-top:8px'>Source</div><div class='val'><a target='_blank' rel='noopener noreferrer' href='" + esc(c.sourceLink || c.sourceUrl) + "'>" + esc(c.sourceUrl) + "</a></div>"; m.classList.add("open"); } function render() { const rs = rows(); stats(rs); let h = "<thead><tr><th class='sticky thead-sticky'>University</th><th class='score'>Score</th><th class='score'>N_u</th>"; DATA.policies.forEach(p => { h += "<th>" + esc(p) + "</th>"; }); h += "</tr></thead><tbody>"; rs.forEach(u => { h += "<tr><td class='sticky'><div>" + esc(u.university) + "</div><div class='chip'>" + u.region + "</div></td><td class='score'>" + ff(u.friendliness) + "</td><td class='score'>" + u.Nu + "</td>"; DATA.policies.forEach(p => { const c = u.cells[p], k = cc(c); if (!c) { h += "<td><span class='cell " + k.k + "'>" + k.l + "</span></td>"; } else { h += "<td><span class='cell " + k.k + "' data-u='" + encodeURIComponent(u.university) + "' data-p='" + encodeURIComponent(p) + "'>" + k.l + "</span></td>"; } }); h += "</tr>"; }); h += "</tbody>"; t.innerHTML = h; Array.from(t.querySelectorAll(".cell[data-u]")).forEach(n => n.addEventListener("click", () => { const u = decodeURIComponent(n.getAttribute("data-u")); const p = decodeURIComponent(n.getAttribute("data-p")); const row = DATA.universities.find(x => x.university === u); if (row && row.cells[p]) openD(row, p, row.cells[p]); })); } s.addEventListener("input", render); so.addEventListener("change", render); document.getElementById("regions").addEventListener("click", e => { const b = e.target.closest("button[data-r]"); if (!b) return; region = b.getAttribute("data-r"); Array.from(document.querySelectorAll("#regions button")).forEach(x => x.classList.toggle("active", x === b)); render(); }); document.getElementById("mc").addEventListener("click", () => m.classList.remove("open")); m.addEventListener("click", e => { if (e.target === m) m.classList.remove("open"); }); document.addEventListener("keydown", e => { if (e.key === "Escape") m.classList.remove("open"); }); render(); })();
