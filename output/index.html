<head>

<title>University AI Policy Dashboard</title>
<style>
:root{
  --green:#2e7d32;
  --green-plus:#1b5e20;
  --yellow:#f9a825;
  --red:#c62828;
  --blank:#cfd8dc;
  --indian:#ff9800;
  --intl:#1565c0;
  --bg:#f7f9fb;
  --border:#d7dde3;
}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Tahoma,sans-serif;background:var(--bg);color:#102027}
header{padding:16px 18px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:20}
h1{margin:0 0 6px;font-size:22px}
.sub{font-size:13px;color:#455a64}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
input[type=text]{padding:8px 10px;border:1px solid var(--border);border-radius:8px;min-width:260px}
button{padding:8px 10px;border:1px solid #b0bec5;background:#fff;border-radius:8px;cursor:pointer}
button.active{background:#263238;color:#fff;border-color:#263238}
.wrap{padding:12px 12px 24px}
.table-wrap{overflow:auto;border:1px solid var(--border);background:#fff;max-height:78vh}
table{border-collapse:separate;border-spacing:0;min-width:2100px;width:max-content}
th,td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px;font-size:12px;vertical-align:top;background:#fff}
thead th{position:sticky;top:0;z-index:8;background:#eceff1;font-weight:700;text-align:left}
.sticky-uni{position:sticky;left:0;z-index:7;min-width:250px;max-width:250px}
.sticky-score{position:sticky;left:250px;z-index:7;min-width:150px;max-width:150px}
thead .sticky-uni, thead .sticky-score{z-index:9;background:#cfd8dc}
.uni-indian{border-left:5px solid var(--indian)!important}
.uni-international{border-left:5px solid var(--intl)!important}
.cell{width:70px;min-width:70px;height:34px;cursor:pointer}
.c-green{background:var(--green)}
.c-green_plus{background:var(--green-plus)}
.c-yellow{background:var(--yellow)}
.c-red{background:var(--red)}
.c-blank{background:var(--blank)}
tfoot td{position:sticky;bottom:0;background:#eceff1;z-index:6;font-weight:700}
tfoot .sticky-uni,tfoot .sticky-score{z-index:7}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:40}
.modal.open{display:flex}
.card{background:#fff;max-width:840px;width:100%;max-height:86vh;overflow:auto;border-radius:12px;padding:16px}
.card h3{margin:0 0 8px}
.close{float:right}
.ev{border:1px solid var(--border);padding:10px;border-radius:8px;margin-top:8px;background:#fafafa}
.small{font-size:12px;color:#455a64}
</style>
</head>

const state = { search:'', region:'All', desc:true };
const policyIds = Object.keys(policyLabels);
const className = {green:'Green',green_plus:'Green+',yellow:'Yellow',red:'Red',blank:'Blank'};

function scoreText(u){
  if(u.metrics.score===null) return 'N/A';
  return u.metrics.score.toFixed(1) + '  N=' + u.metrics.n + '  C=' + u.metrics.coverage.toFixed(2);
}

function sortData(rows){
  const arr=[...rows];
  arr.sort((a,b)=>{
    const aNA=a.metrics.score===null,bNA=b.metrics.score===null;
    if(aNA&&bNA) return a.university.localeCompare(b.university);
    if(aNA) return 1;
    if(bNA) return -1;
    const primary = state.desc ? (b.metrics.score-a.metrics.score):(a.metrics.score-b.metrics.score);
    if(primary!==0) return primary;
    const cov = state.desc ? (b.metrics.coverage-a.metrics.coverage):(a.metrics.coverage-b.metrics.coverage);
    if(cov!==0) return cov;
    return a.university.localeCompare(b.university);
  });
  return arr;
}

function filtered(){
  return data.filter(u=>{
    const okSearch = u.university.toLowerCase().includes(state.search.toLowerCase());
    const okRegion = state.region==='All' ? true : u.region===state.region;
    return okSearch && okRegion;
  });
}

function cellClass(c){ return 'c-' + c; }

function render(){
  const rows = sortData(filtered());
  const tbl = document.getElementById('tbl');
  let h = '<thead><tr>' +
    '<th class="sticky-uni">University</th>' +
    '<th class="sticky-score">AI Friendliness Score</th>' +
    policyIds.map(p=>'<th>'+policyLabels[p]+'</th>').join('') +
    '</tr></thead>';

  h += '<tbody>';
  for(const u of rows){
    const uniClass = u.region==='Indian' ? 'uni-indian':'uni-international';
    h += '<tr>';
    h += '<td class="sticky-uni '+uniClass+'">'+u.university+'</td>';
    h += '<td class="sticky-score">'+scoreText(u)+'</td>';
    for(const p of policyIds){
      const c=u.cells[p];
      h += '<td class="cell '+cellClass(c.classification)+'" data-u="'+encodeURIComponent(u.university)+'" data-p="'+p+'"></td>';
    }
    h += '</tr>';
  }
  h += '</tbody>';

  h += '<tfoot><tr>';
  h += '<td class="sticky-uni">Policy Average</td><td class="sticky-score">mean / 3 (coverage)</td>';
  for(const p of policyIds){
    const a = policyAverages[p];
    const txt = a.mean===null ? 'N/A' : (a.mean.toFixed(2)+' / 3 ('+(a.coverage*100).toFixed(1)+'%)');
    h += '<td>'+txt+'</td>';
  }
  h += '</tr></tfoot>';
  tbl.innerHTML = h;

  document.querySelectorAll('.cell').forEach(td=>{
    td.addEventListener('click', ()=>{
      const uni = decodeURIComponent(td.getAttribute('data-u'));
      const p = td.getAttribute('data-p');
      const u = data.find(x=>x.university===uni);
      const c = u.cells[p];
      let body = '<h3>'+u.university+' - '+p+' '+policyLabels[p]+'</h3>';
      body += '<div><strong>Classification:</strong> '+className[c.classification]+'</div>';
      body += '<p>'+c.reason+'</p>';
      if(c.evidence && c.evidence.length){
        for(const e of c.evidence){
          const frag = '#:~:text=' + encodeURIComponent(e.phrase || '');
          body += '<div class="ev">' +
            '<div>'+e.quote+'</div>' +
            '<div class="small">Source: '+e.sourceTitle+'</div>' +
            '<div><a href="'+e.url+frag+'" target="_blank" rel="noopener">Open source</a></div>' +
            '</div>';
        }
      } else {
        body += '<div>No official evidence found after exhaustive check.</div>';
      }
      document.getElementById('modal-body').innerHTML = body;
      document.getElementById('modal').classList.add('open');
    });
  });
}

const btnAll=document.getElementById('region-all');
const btnInd=document.getElementById('region-ind');
const btnInt=document.getElementById('region-int');
function setRegion(r){
  state.region=r;
  [btnAll,btnInd,btnInt].forEach(b=>b.classList.remove('active'));
  (r==='All'?btnAll:r==='Indian'?btnInd:btnInt).classList.add('active');
  render();
}
btnAll.onclick=()=>setRegion('All');
btnInd.onclick=()=>setRegion('Indian');
btnInt.onclick=()=>setRegion('International');

document.getElementById('search').addEventListener('input',e=>{ state.search=e.target.value; render(); });
document.getElementById('sort').addEventListener('click',e=>{ state.desc=!state.desc; e.target.textContent='Sort Score: '+(state.desc?'Desc':'Asc'); render(); });
document.getElementById('close').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') document.getElementById('modal').classList.remove('open'); });

render();
</script>
